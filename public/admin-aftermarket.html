<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Aftermarket Network</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; font-family:-apple-system, BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#020203; color:#fff; overflow-x:hidden; }

    #login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .login-box { background:#090E17; border:1px solid rgba(43,132,254,0.2); border-radius:12px; padding:40px 30px; max-width:340px; width:100%; text-align:center; }
    .login-box h2 { font-size:18px; margin-bottom:20px; text-transform:uppercase; letter-spacing:1px; }
    .login-box p { color:#C8D0DC; font-size:13px; }
    .login-box button { width:100%; padding:14px; background:#2B84FE; color:#fff; border:none; border-radius:8px; font-weight:800; text-transform:uppercase; letter-spacing:1px; cursor:pointer; min-height:48px; }

    #app { display:none; }
    .header { background:#000; padding:20px; border-bottom:1px solid #2a3f5f; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
    .header h1 { font-size:18px; font-weight:900; text-transform:uppercase; letter-spacing:1px; }
    .header h1 span { color:#2B84FE; }
    .logout-btn { background:none; border:1px solid #2a3f5f; color:#C8D0DC; padding:8px 16px; border-radius:6px; font-size:12px; cursor:pointer; min-height:48px; }

    .container { max-width:900px; margin:0 auto; padding:30px 20px 80px; }
    .section-title { font-size:18px; font-weight:900; text-transform:uppercase; letter-spacing:1px; color:#2B84FE; margin:30px 0 16px; }
    .section-title:first-child { margin-top:0; }

    .app-card { background:#090E17; border:1px solid rgba(43,132,254,0.2); border-left:3px solid #2B84FE; border-radius:8px; padding:20px; margin-bottom:14px; }
    .app-top { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:10px; margin-bottom:12px; }
    .app-name { font-size:17px; font-weight:900; }
    .app-cats { font-size:12px; color:#2B84FE; font-weight:700; text-transform:uppercase; }
    .app-detail { font-size:13px; color:#C8D0DC; line-height:1.8; margin-bottom:4px; }
    .app-detail strong { color:#fff; }
    .app-actions { display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }
    .approve-btn, .reject-btn { flex:1; min-width:120px; padding:12px; border:none; border-radius:6px; font-size:13px; font-weight:800; text-transform:uppercase; cursor:pointer; min-height:48px; }
    .approve-btn { background:#00C853; color:#020203; }
    .reject-btn { background:none; border:1px solid #ff4444; color:#ff4444; }

    .shop-card { background:#090E17; border:1px solid rgba(0,200,83,0.25); border-radius:8px; padding:16px 20px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
    .shop-status { color:#00C853; font-size:11px; font-weight:800; text-transform:uppercase; }

    .empty { color:#C8D0DC; font-size:14px; padding:16px 0; }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-box">
      <h2>Checking Login…</h2>
      <p style="color:#C8D0DC; font-size:13px; margin-top:10px;">If you're not signed in, you'll be sent to the login page.</p>
    </div>
  </div>

  <div id="app">
    <div class="header">
      <h1>EVL <span>AFTERMARKET</span> ADMIN</h1>
      <div style="display:flex; align-items:center; gap:14px;">
        <span id="userInfo" style="font-size:12px; color:#C8D0DC;"></span>
        <button class="logout-btn" onclick="doLogout()">Log Out</button>
      </div>
    </div>
    <div class="container">

      <div class="section-title">Pending Applications</div>
      <div id="pendingList"><div class="empty">Loading…</div></div>

      <div class="section-title">Approved Shops</div>
      <div id="approvedList"><div class="empty">Loading…</div></div>

    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, setDoc, updateDoc, deleteDoc, query, where }
      from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCvvH8bYkoHM933iwODK4AlT2T4HVAJzho",
      authDomain: "evl-acquisition-radar.firebaseapp.com",
      projectId: "evl-acquisition-radar",
      storageBucket: "evl-acquisition-radar.firebasestorage.app",
      messagingSenderId: "84195145348",
      appId: "1:84195145348:web:b10f837bee92ce2e4674d1",
      measurementId: "G-S746N8SY7Z"
    };
    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);
    const APPLICATIONS_COL = "evl_aftermarket_applications";
    const SHOPS_COL = "evl_aftermarket_shops";

    // ── Real Firebase login check — same pattern as admin-leads.html ──
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        localStorage.setItem('evl_last_page', '/admin-aftermarket');
        window.location.href = '/login.html';
      } else {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('userInfo').textContent = `Logged in as: ${user.email}`;
        initApp();
      }
    });

    window.doLogout = async function(){
      await signOut(auth);
      window.location.href = '/login.html';
    };

    window.EVL_AM_ADMIN_DB = {
      async getPendingApplications(){
        const q = query(collection(db, APPLICATIONS_COL), where("status","==","pending"));
        const snap = await getDocs(q);
        return snap.docs.map(d => ({ id:d.id, ...d.data() }));
      },
      async getApprovedShops(){
        const q = query(collection(db, SHOPS_COL), where("status","==","approved"));
        const snap = await getDocs(q);
        return snap.docs.map(d => ({ id:d.id, ...d.data() }));
      },
      async approveApplication(appData, appId){
        // One shop doc per category so the directory can filter cleanly
        for(const cat of (appData.categories || [])){
          await setDoc(doc(collection(db, SHOPS_COL)), {
            shopName: appData.shopName,
            category: cat,
            hub: appData.hub,
            phone: appData.phone,
            email: appData.email,
            website: appData.website || '',
            warrantyTerms: appData.warrantyTerms,
            rating: null,
            reviewCount: 0,
            status: 'approved',
            sourceApplicationId: appId
          });
        }
        await updateDoc(doc(db, APPLICATIONS_COL, appId), { status: 'approved' });
      },
      async rejectApplication(appId){
        await updateDoc(doc(db, APPLICATIONS_COL, appId), { status: 'rejected' });
      }
    };
  </script>

  <script>
    const CAT_LABELS = { lift:'Lift Kits', wheels:'Wheels & Tires', lights:'Light Bars', bed:'Bed Accessories' };
    const HUB_LABELS = {
      dfw:'DFW / Plano, TX', houston:'Houston, TX', atlanta:'Atlanta, GA', chicago:'Chicago, IL',
      denver:'Denver, CO', phoenix:'Phoenix, AZ', la:'Los Angeles, CA', nyc:'NYC / NJ',
      miami:'Miami, FL', nashville:'Nashville, TN', seattle:'Seattle, WA', minneapolis:'Minneapolis, MN',
      charlotte:'Charlotte, NC', columbus:'Columbus, OH', philly:'Philadelphia, PA', detroit:'Detroit, MI',
      richmond:'Richmond, VA', indy:'Indianapolis, IN', stlouis:'St. Louis, MO', milwaukee:'Milwaukee, WI',
      baltimore:'Baltimore, MD', lasvegas:'Las Vegas, NV'
    };

    // initApp() is called directly from onAuthStateChanged in the module script above
    // once a real Firebase-authenticated admin user is confirmed
    async function initApp(){
      await loadPending();
      await loadApproved();
    }

    async function loadPending(){
      const el = document.getElementById('pendingList');
      try {
        const apps = await window.EVL_AM_ADMIN_DB.getPendingApplications();
        if(!apps.length){ el.innerHTML = '<div class="empty">No pending applications.</div>'; return; }
        el.innerHTML = apps.map(a => `
          <div class="app-card">
            <div class="app-top">
              <div class="app-name">${esc(a.shopName)}</div>
              <div class="app-cats">${(a.categories||[]).map(c=>CAT_LABELS[c]||c).join(' · ')}</div>
            </div>
            <div class="app-detail"><strong>Hub:</strong> ${HUB_LABELS[a.hub] || esc(a.hub)}</div>
            <div class="app-detail"><strong>Contact:</strong> ${esc(a.contactName)} — ${esc(a.phone)} — ${esc(a.email)}</div>
            <div class="app-detail"><strong>Years in business:</strong> ${esc(a.yearsInBusiness||'—')}</div>
            <div class="app-detail"><strong>Certifications:</strong> ${esc(a.certifications)}</div>
            <div class="app-detail"><strong>Warranty:</strong> ${esc(a.warrantyTerms)}</div>
            <div class="app-detail"><strong>Insurance confirmed:</strong> ${a.insuranceConfirmed ? '✅ Yes' : '❌ No'}</div>
            <div class="app-actions">
              <button class="approve-btn" onclick='approveApp(${JSON.stringify(a)}, "${a.id}")'>Approve</button>
              <button class="reject-btn" onclick="rejectApp('${a.id}')">Reject</button>
            </div>
          </div>
        `).join('');
      } catch(e){
        console.error('[EVL Aftermarket Admin] Load pending failed:', e);
        el.innerHTML = '<div class="empty">Failed to load applications.</div>';
      }
    }

    async function loadApproved(){
      const el = document.getElementById('approvedList');
      try {
        const shops = await window.EVL_AM_ADMIN_DB.getApprovedShops();
        if(!shops.length){ el.innerHTML = '<div class="empty">No approved shops yet.</div>'; return; }
        el.innerHTML = shops.map(s => `
          <div class="shop-card">
            <div>
              <strong>${esc(s.shopName)}</strong> — ${CAT_LABELS[s.category]||s.category} — ${HUB_LABELS[s.hub] || esc(s.hub)}
            </div>
            <div class="shop-status">✅ Approved</div>
          </div>
        `).join('');
      } catch(e){
        console.error('[EVL Aftermarket Admin] Load approved failed:', e);
        el.innerHTML = '<div class="empty">Failed to load shops.</div>';
      }
    }

    async function approveApp(appData, appId){
      if(!confirm(`Approve ${appData.shopName} for: ${(appData.categories||[]).join(', ')}?`)) return;
      try {
        await window.EVL_AM_ADMIN_DB.approveApplication(appData, appId);
        await loadPending();
        await loadApproved();
      } catch(e){
        console.error('[EVL Aftermarket Admin] Approve failed:', e);
        alert('Approval failed — check console.');
      }
    }

    async function rejectApp(appId){
      if(!confirm('Reject this application?')) return;
      try {
        await window.EVL_AM_ADMIN_DB.rejectApplication(appId);
        await loadPending();
      } catch(e){
        console.error('[EVL Aftermarket Admin] Reject failed:', e);
        alert('Reject failed — check console.');
      }
    }

    function esc(str){
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    window.approveApp = approveApp;
    window.rejectApp = rejectApp;
  </script>

</body>
</html>
