<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lead Dashboard — EVL</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Barlow+Condensed:wght@700;900" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #F7F8FA;
      --white: #FFFFFF;
      --blue: #2563EB;
      --blue-dark: #1D4ED8;
      --blue-light: #EFF6FF;
      --text: #111827;
      --text-mid: #374151;
      --text-soft: #6B7280;
      --border: #E5E7EB;
      --success-bg: #F0FDF4;
      --success-text: #16A34A;
      --warning-bg: #FEF3C7;
      --warning-text: #D97706;
      --info-bg: #EFF6FF;
      --info-text: #2563EB;
    }
    
    body {
      overflow-x: hidden;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }
    
    /* ── NAV ── */
    nav {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .nav-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 17px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }
    
    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .nav-user {
      font-size: 13px;
      color: var(--text-soft);
    }
    
    .nav-logout {
      background: #FEF2F2;
      color: #DC2626;
      border: 1px solid #DC2626;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    
    .nav-logout:hover {
      background: #DC2626;
      color: var(--white);
    }
    
    /* ── MAIN CONTAINER ── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px;
    }
    
    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }
    
    .subtitle {
      font-size: 14px;
      color: var(--text-soft);
      margin-bottom: 24px;
    }
    
    /* ── STATS BAR ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    
    .stat-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    
    .stat-number {
      font-size: 28px;
      font-weight: 700;
      color: var(--blue);
    }
    
    .stat-label {
      font-size: 12px;
      color: var(--text-soft);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    
    /* ── LEADS TABLE ── */
    .table-container {
      background: var(--white);
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th {
      background: var(--blue-light);
      color: var(--blue-dark);
      padding: 14px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      border-bottom: 2px solid var(--border);
    }
    
    td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    
    tr:hover {
      background: var(--bg);
    }
    
    tr:last-child td {
      border-bottom: none;
    }
    
    .lead-name {
      font-weight: 600;
      color: var(--text);
    }
    
    .lead-phone {
      color: var(--text-soft);
    }
    
    .lead-vehicle {
      color: var(--text-mid);
    }
    
    /* ── BADGES ── */
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.01em;
    }
    
    .badge-new {
      background: var(--info-bg);
      color: var(--info-text);
    }
    
    .badge-contacted {
      background: var(--warning-bg);
      color: var(--warning-text);
    }
    
    .badge-qualified {
      background: #E0E7FF;
      color: #4F46E5;
    }
    
    .badge-booked {
      background: var(--success-bg);
      color: var(--success-text);
    }
    
    .badge-source {
      background: #F3E8FF;
      color: #7C3AED;
      margin-left: 8px;
    }
    
    /* ── ACTION BUTTON ── */
    .btn-view {
      background: var(--blue-light);
      color: var(--blue);
      border: 1px solid var(--blue);
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
    }
    
    .btn-view:hover {
      background: var(--blue);
      color: var(--white);
    }
    
    /* ── LOADING ── */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-soft);
    }
    
    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* ── MODAL ── */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    
    .modal.open {
      display: flex;
    }
    
    .modal-content {
      background: var(--white);
      border-radius: 12px;
      padding: 32px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }
    
    .modal-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }
    
    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-soft);
    }
    
    .modal-field {
      margin-bottom: 16px;
    }
    
    .modal-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
      display: block;
    }
    
    .modal-value {
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      padding: 10px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--text);
    }
    
    select:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-light);
    }
    
    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    
    .btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .btn-primary {
      background: var(--blue);
      color: var(--white);
    }
    
    .btn-primary:hover {
      background: var(--blue-dark);
    }
    
    .btn-secondary {
      background: var(--bg);
      color: var(--text-mid);
      border: 1px solid var(--border);
    }
    
    .btn-secondary:hover {
      background: var(--border);
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="home.html" class="nav-logo">EXPRESS VEHICLE LOCATORS</a>
  <div class="nav-right">
    <div class="nav-user" id="userInfo">Loading...</div>
    <button class="nav-logout" id="logoutBtn">Log Out</button>
  </div>
</nav>

<!-- MAIN CONTAINER -->
<div class="container">
  <h1>📊 Lead Dashboard</h1>
  <p class="subtitle">Real-time customer leads from all sources (AutoTrader, Facebook, Phone, SMS, etc.)</p>
  
  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-number" id="statNew">0</div>
      <div class="stat-label">New Leads</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="statContacted">0</div>
      <div class="stat-label">Contacted</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="statQualified">0</div>
      <div class="stat-label">Qualified</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="statBooked">0</div>
      <div class="stat-label">Booked</div>
    </div>
  </div>
  
  <!-- LEADS TABLE -->
  <div class="table-container">
    <div id="tableContent">
      <div class="loading">
        <span class="spinner"></span>
        Loading leads...
      </div>
    </div>
  </div>
  
</div>

<!-- DETAIL MODAL -->
<div class="modal" id="leadModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">Lead Details</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modalBody">
      <!-- Populated by JavaScript -->
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" id="saveLead" onclick="saveLead()">Save Changes</button>
    </div>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import {
    getAuth,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
  import {
    getFirestore, collection, getDocs, doc, updateDoc, onSnapshot, query, orderBy
  } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyCvvH8bYkoHM933iwODK4AlT2T4HVAJzho",
    authDomain: "evl-acquisition-radar.firebaseapp.com",
    projectId: "evl-acquisition-radar",
    storageBucket: "evl-acquisition-radar.firebasestorage.app",
    messagingSenderId: "84195145348",
    appId: "1:84195145348:web:b10f837bee92ce2e4674d1",
    measurementId: "G-S746N8SY7Z"
  };
  
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  
  let currentUser = null;
  let allLeads = [];
  let selectedLeadId = null;
  
  // ── CHECK IF USER IS LOGGED IN ──
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = 'login.html';
    } else {
      currentUser = user;
      document.getElementById('userInfo').textContent = `Logged in as: ${user.email}`;
      loadLeads();
    }
  });
  
  // ── LOGOUT BUTTON ──
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try {
      await signOut(auth);
      window.location.href = 'login.html';
    } catch (e) {
      console.error('Logout error:', e);
    }
  });
  
  // ── LOAD ALL LEADS FROM FIRESTORE ──
  async function loadLeads() {
    try {
      const q = query(collection(db, 'evl_leads'), orderBy('dateReceived', 'desc'));
      
      onSnapshot(q, (snapshot) => {
        allLeads = [];
        snapshot.forEach((doc) => {
          allLeads.push({
            id: doc.id,
            ...doc.data()
          });
        });
        
        renderTable();
        updateStats();
      });
      
    } catch (e) {
      console.error('Error loading leads:', e);
      document.getElementById('tableContent').innerHTML = '<div class="loading" style="color:red;">Error loading leads</div>';
    }
  }
  
  // ── RENDER TABLE ──
  function renderTable() {
    if (allLeads.length === 0) {
      document.getElementById('tableContent').innerHTML = '<div class="loading">No leads yet</div>';
      return;
    }
    
    let html = `
      <table>
        <thead>
          <tr>
            <th>Customer</th>
            <th>Phone</th>
            <th>Vehicle</th>
            <th>Source</th>
            <th>Status</th>
            <th>Received</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
    `;
    
    allLeads.forEach((lead) => {
      const date = new Date(lead.dateReceived.seconds * 1000).toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
      
      const statusBadge = getStatusBadge(lead.status || 'new');
      const vehicle = (lead.vehicleYear ? lead.vehicleYear + ' ' : '') + (lead.vehicleMake || '') + ' ' + (lead.vehicleModel || '');
      
      html += `
        <tr>
          <td><span class="lead-name">${lead.customerName}</span></td>
          <td><span class="lead-phone">${lead.customerPhone}</span></td>
          <td><span class="lead-vehicle">${vehicle.trim()}</span></td>
          <td><span class="badge badge-source">${lead.leadSource}</span></td>
          <td>${statusBadge}</td>
          <td>${date}</td>
          <td><button class="btn-view" onclick="viewLead('${lead.id}')">View</button></td>
        </tr>
      `;
    });
    
    html += `
        </tbody>
      </table>
    `;
    
    document.getElementById('tableContent').innerHTML = html;
  }
  
  // ── GET STATUS BADGE HTML ──
  function getStatusBadge(status) {
    const statusMap = {
      'new': '<span class="badge badge-new">New</span>',
      'contacted': '<span class="badge badge-contacted">Contacted</span>',
      'qualified': '<span class="badge badge-qualified">Qualified</span>',
      'booked': '<span class="badge badge-booked">Booked</span>'
    };
    return statusMap[status] || statusMap['new'];
  }
  
  // ── UPDATE STATS ──
  function updateStats() {
    const stats = { new: 0, contacted: 0, qualified: 0, booked: 0 };
    
    allLeads.forEach((lead) => {
      const status = lead.status || 'new';
      if (stats.hasOwnProperty(status)) {
        stats[status]++;
      }
    });
    
    document.getElementById('statNew').textContent = stats.new;
    document.getElementById('statContacted').textContent = stats.contacted;
    document.getElementById('statQualified').textContent = stats.qualified;
    document.getElementById('statBooked').textContent = stats.booked;
  }
  
  // ── VIEW LEAD DETAILS ──
  window.viewLead = function(leadId) {
    selectedLeadId = leadId;
    const lead = allLeads.find(l => l.id === leadId);
    
    if (!lead) return;
    
    const vehicle = (lead.vehicleYear ? lead.vehicleYear + ' ' : '') + (lead.vehicleMake || '') + ' ' + (lead.vehicleModel || '');
    const date = new Date(lead.dateReceived.seconds * 1000).toLocaleString();
    
    let html = `
      <div class="modal-field">
        <label class="modal-label">Customer Name</label>
        <div class="modal-value">${lead.customerName}</div>
      </div>
      <div class="modal-field">
        <label class="modal-label">Phone</label>
        <div class="modal-value">${lead.customerPhone}</div>
      </div>
      <div class="modal-field">
        <label class="modal-label">Email</label>
        <div class="modal-value">${lead.customerEmail || '—'}</div>
      </div>
      <div class="modal-field">
        <label class="modal-label">Location</label>
        <div class="modal-value">${lead.customerLocation || '—'}</div>
      </div>
      <div class="modal-field">
        <label class="modal-label">Vehicle</label>
        <div class="modal-value">${vehicle.trim() || '—'}</div>
      </div>
      <div class="modal-field">
        <label class="modal-label">Lead Source</label>
        <div class="modal-value">${lead.leadSource}</div>
      </div>
      <div class="modal-field">
        <label class="modal-label">Lead Type</label>
        <div class="modal-value">${lead.leadType}</div>
      </div>
      <div class="modal-field">
        <label class="modal-label">Dealer Name</label>
        <div class="modal-value">${lead.dealerName || '—'}</div>
      </div>
      <div class="modal-field">
        <label class="modal-label">Status</label>
        <select id="newStatus" style="width:100%; padding:10px; border:1px solid #E5E7EB; border-radius:4px;">
          <option value="new" ${lead.status === 'new' ? 'selected' : ''}>New</option>
          <option value="contacted" ${lead.status === 'contacted' ? 'selected' : ''}>Contacted</option>
          <option value="qualified" ${lead.status === 'qualified' ? 'selected' : ''}>Qualified</option>
          <option value="booked" ${lead.status === 'booked' ? 'selected' : ''}>Booked</option>
        </select>
      </div>
      <div class="modal-field">
        <label class="modal-label">AI Transcript</label>
        <div class="modal-value" style="white-space:pre-wrap; max-height:150px; overflow-y:auto;">${lead.aiTranscript || '—'}</div>
      </div>
      <div class="modal-field">
        <label class="modal-label">Notes</label>
        <div class="modal-value" style="white-space:pre-wrap; max-height:150px; overflow-y:auto;">${lead.notes || '—'}</div>
      </div>
      <div class="modal-field">
        <label class="modal-label">Received</label>
        <div class="modal-value">${date}</div>
      </div>
    `;
    
    document.getElementById('modalBody').innerHTML = html;
    document.getElementById('modalTitle').textContent = `Lead: ${lead.customerName}`;
    document.getElementById('leadModal').classList.add('open');
  };
  
  // ── SAVE STATUS CHANGE ──
  window.saveLead = async function() {
    const newStatus = document.getElementById('newStatus').value;
    const leadRef = doc(db, 'evl_leads', selectedLeadId);
    
    try {
      await updateDoc(leadRef, {
        status: newStatus
      });
      
      closeModal();
      // Table will re-render automatically via onSnapshot listener
    } catch (e) {
      console.error('Error updating lead:', e);
      alert('Error saving changes');
    }
  };
  
  // ── CLOSE MODAL ──
  window.closeModal = function() {
    document.getElementById('leadModal').classList.remove('open');
    selectedLeadId = null;
  };
  
</script>

</body>
</html>
