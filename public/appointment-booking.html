<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Your Appointment - EVL</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f1419 0%, #1a2332 100%);
      color: #ffffff;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      background: #000000;
      padding: 20px;
      border-bottom: 1px solid #2a3f5f;
      text-align: center;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header h1 span {
      color: #4a9eff;
    }

    /* Main container */
    .container {
      max-width: 780px;
      margin: 40px auto;
      padding: 20px;
    }

    /* Status section */
    .status-box {
      background: rgba(74, 158, 255, 0.1);
      border: 1px solid #4a9eff;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 30px;
      text-align: center;
    }

    .status-box .checkmark {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .status-box h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .status-box p {
      font-size: 14px;
      color: #a0b0c0;
      line-height: 1.5;
    }

    /* Vehicle details */
    .vehicle-details {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #2a3f5f;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 30px;
    }

    .vehicle-details h3 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #7a8aa0;
      margin-bottom: 15px;
    }

    .vehicle-details .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 14px;
    }

    .vehicle-details .detail-row:last-child {
      border-bottom: none;
    }

    .vehicle-details .label {
      color: #a0b0c0;
    }

    .vehicle-details .value {
      font-weight: 600;
      color: #ffffff;
    }

    /* Booking form */
    .booking-form {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #2a3f5f;
      border-radius: 8px;
      padding: 25px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input[type="date"],
    .form-group select {
      width: 100%;
      padding: 14px 16px;
      background: #0d1829;
      border: 2px solid #2B84FE;
      border-radius: 10px;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
    }

    .form-group input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
      width: 20px;
      height: 20px;
    }

    .form-group input[type="date"]:focus,
    .form-group select:focus {
      outline: none;
      border-color: #4a9eff;
      background: rgba(74, 158, 255, 0.05);
    }

    .form-group input[type="date"]::placeholder {
      color: #7a8aa0;
    }

    /* Time slots */
    .time-slots {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .time-slot {
      padding: 14px 10px;
      background: #0d1829;
      border: 1px solid #2a3f5f;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      transition: all 0.2s;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .time-slot:hover {
      border-color: #4a9eff;
      background: rgba(74, 158, 255, 0.1);
    }

    .time-slot.selected {
      background: #4a9eff;
      border-color: #4a9eff;
      color: #ffffff;
    }

    /* Button */
    .book-btn {
      width: 100%;
      padding: 14px;
      background: #4a9eff;
      border: none;
      border-radius: 6px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }

    .book-btn:hover:not(:disabled) {
      background: #2a7fd9;
      transform: translateY(-2px);
    }

    .book-btn:disabled {
      background: #4a5f7f;
      cursor: not-allowed;
      opacity: 0.6;
    }

    /* Status messages */
    .status-message {
      padding: 12px;
      border-radius: 6px;
      margin-top: 15px;
      font-size: 13px;
      text-align: center;
      display: none;
    }

    .status-message.success {
      background: rgba(76, 175, 80, 0.1);
      color: #4caf50;
      border: 1px solid rgba(76, 175, 80, 0.3);
      display: block;
    }

    .status-message.error {
      background: rgba(244, 67, 54, 0.1);
      color: #f44336;
      border: 1px solid rgba(244, 67, 54, 0.3);
      display: block;
    }

    .status-message.info {
      background: rgba(74, 158, 255, 0.1);
      color: #4a9eff;
      border: 1px solid rgba(74, 158, 255, 0.3);
      display: block;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(74, 158, 255, 0.3);
      border-radius: 50%;
      border-top-color: #4a9eff;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Hide vehicle details when no URL params */
    .vehicle-details.hidden { display: none; }

    /* Fix input field colors to match EVL dark design */
    #customerNameInput, #vehicleInput {
      width: 100%;
      padding: 14px 16px;
      background: #0d1829 !important;
      border: 2px solid #2a3f5f !important;
      border-radius: 10px;
      color: #ffffff !important;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    #customerNameInput:focus, #vehicleInput:focus {
      border-color: #2B84FE !important;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .container {
        margin: 20px auto;
        padding: 15px;
      }

      .booking-form {
        padding: 20px;
      }

      .time-slots {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>EXPRESS <span>VEHICLE</span> LOCATORS</h1>
  </div>

  <!-- Main container -->
  <div class="container">
    <!-- Status box -->
    <div class="status-box">
      <div class="checkmark">✅</div>
      <h2>Vehicle Verified!</h2>
      <p>Great news! Your vehicle has been verified. Now let's book your appointment.</p>
    </div>

    <!-- Vehicle details -->
    <div class="vehicle-details" id="appointmentDetailsBox">
      <h3>Appointment Details</h3>
      <div class="detail-row">
        <span class="label">Customer Name:</span>
        <span class="value" id="customerNameDisplay">—</span>
      </div>
      <div class="detail-row">
        <span class="label">Vehicle:</span>
        <span class="value" id="vehicleDisplay">—</span>
      </div>
      <div class="detail-row">
        <span class="label">Status:</span>
        <span class="value" style="color: #4caf50;">Ready to Book</span>
      </div>
    </div>

    <!-- Booking form -->
    <div class="booking-form">
      <form id="bookingForm">

        <!-- Name field — shown when not pre-populated from URL -->
        <div class="form-group" id="nameFieldGroup">
          <label for="customerNameInput">Your Full Name</label>
          <input
            type="text"
            id="customerNameInput"
            placeholder="Enter your full name"
            style="width:100%;padding:14px 16px;background:#0d1829;border:2px solid #2a3f5f;border-radius:10px;color:#ffffff;font-size:15px;font-family:inherit;outline:none;"
          />
        </div>

        <!-- Vehicle field — shown when not pre-populated from URL -->
        <div class="form-group" id="vehicleFieldGroup">
          <label for="vehicleInput">Vehicle of Interest (Year, Make, Model)</label>
          <input
            type="text"
            id="vehicleInput"
            placeholder="e.g. 2024 Toyota Camry XLE"
            style="width:100%;padding:14px 16px;background:#0d1829;border:2px solid #2a3f5f;border-radius:10px;color:#ffffff;font-size:15px;font-family:inherit;outline:none;"
          />
        </div>

        <!-- Date picker -->
        <div class="form-group">
          <label for="appointmentDate">Appointment Date</label>
          <input 
            type="date" 
            id="appointmentDate" 
            required
            min=""
          >
          <small style="color: #7a8aa0; margin-top: 5px; display: block;">Available Monday - Friday</small>
        </div>

        <!-- Time picker -->
        <div class="form-group">
          <label>Preferred Time</label>
          <div class="time-slots" id="timeSlots"></div>
        </div>

        <!-- Phone for confirmation -->
        <div class="form-group">
          <label for="customerPhone">Phone Number (for SMS confirmation)</label>
          <input 
            type="tel" 
            id="customerPhone" 
            placeholder="(555) 123-4567"
            required
          >
        </div>

        <!-- Email for confirmation -->
        <div class="form-group">
          <label for="customerEmail">Email (for confirmation)</label>
          <input 
            type="email" 
            id="customerEmail" 
            placeholder="you@example.com"
            required
          >
        </div>

        <!-- Book button -->
        <button type="submit" class="book-btn" id="bookBtn">
          Book Appointment
        </button>

        <!-- Status message -->
        <div class="status-message" id="statusMessage"></div>
      </form>
    </div>
  </div>

  <script type="module">
    // ══════════════════════════════════════════════════════════
    // FIREBASE SETUP
    // ══════════════════════════════════════════════════════════

    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyDvV5u1dIvvPvKwLXQZ4MfH-F5bL_yL0hA",
      authDomain: "evl-acquisition-radar.firebaseapp.com",
      projectId: "evl-acquisition-radar",
      storageBucket: "evl-acquisition-radar.appspot.com",
      messagingSenderId: "637284038819",
      appId: "1:637284038819:web:f57c9d21efc62c6ac890e9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ══════════════════════════════════════════════════════════
    // PAGE INITIALIZATION
    // ══════════════════════════════════════════════════════════

    let selectedTime = null;

    // Get URL parameters (passed from verification page)
    const params = new URLSearchParams(window.location.search);
    const recordId = params.get('recordId');
    const customerName = params.get('customerName') || '';
    const vehicleInfo = params.get('vehicleInfo') || '';

    // If customer info was passed in URL — display it and hide the input fields
    if (customerName && customerName !== 'Customer') {
      document.getElementById('customerNameDisplay').textContent = customerName;
      document.getElementById('customerNameInput').value = customerName;
      document.getElementById('nameFieldGroup').style.display = 'none';
    } else {
      document.getElementById('customerNameDisplay').textContent = '—';
    }

    if (vehicleInfo && vehicleInfo !== 'Your Vehicle') {
      document.getElementById('vehicleDisplay').textContent = vehicleInfo;
      document.getElementById('vehicleInput').value = vehicleInfo;
      document.getElementById('vehicleFieldGroup').style.display = 'none';
    } else {
      document.getElementById('vehicleDisplay').textContent = '—';
    }

    // Hide the appointment details box if no URL params provided
    if (!customerName && !vehicleInfo && !recordId) {
      document.getElementById('appointmentDetailsBox').style.display = 'none';
    }

    // Fix input field styling to match dark EVL design
    ['customerNameInput', 'vehicleInput'].forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.style.backgroundColor = '#0d1829';
        el.style.color = '#ffffff';
        el.style.border = '2px solid #2a3f5f';
        el.style.borderRadius = '10px';
        el.style.padding = '14px 16px';
        el.style.fontSize = '15px';
        el.style.width = '100%';
        el.addEventListener('focus', () => el.style.borderColor = '#2B84FE');
        el.addEventListener('blur', () => el.style.borderColor = '#2a3f5f');
      }
    });

    // ══════════════════════════════════════════════════════════
    // DATE PICKER: SET MINIMUM DATE TO TOMORROW
    // ══════════════════════════════════════════════════════════

    function setDateLimits() {
      const dateInput = document.getElementById('appointmentDate');
      const today = new Date();
      const tomorrow = new Date(today);
      tomorrow.setDate(tomorrow.getDate() + 1);
      
      const tomorrowString = tomorrow.toISOString().split('T')[0];
      dateInput.setAttribute('min', tomorrowString);

      // Set max to 30 days from now
      const maxDate = new Date(tomorrow);
      maxDate.setDate(maxDate.getDate() + 30);
      const maxDateString = maxDate.toISOString().split('T')[0];
      dateInput.setAttribute('max', maxDateString);
    }

    setDateLimits();

    // ══════════════════════════════════════════════════════════
    // TIME SLOTS: GENERATE 8AM - 5PM, EVERY 30 MINUTES
    // ══════════════════════════════════════════════════════════

    function generateTimeSlots() {
      const slotsContainer = document.getElementById('timeSlots');
      slotsContainer.innerHTML = '';

      const times = [];
      for (let hour = 8; hour < 17; hour++) {
        for (let min = 0; min < 60; min += 30) {
          const timeString = `${String(hour).padStart(2, '0')}:${String(min).padStart(2, '0')}`;
          times.push(timeString);
        }
      }

      times.forEach(time => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'time-slot';
        btn.textContent = time;
        
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          
          // Remove selected from all buttons
          document.querySelectorAll('.time-slot').forEach(b => b.classList.remove('selected'));
          
          // Add selected to this button
          btn.classList.add('selected');
          selectedTime = time;
        });

        slotsContainer.appendChild(btn);
      });
    }

    generateTimeSlots();

    // ══════════════════════════════════════════════════════════
    // FORM SUBMISSION
    // ══════════════════════════════════════════════════════════

    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const appointmentDate = document.getElementById('appointmentDate').value;
      const customerPhone = document.getElementById('customerPhone').value;
      const customerEmail = document.getElementById('customerEmail').value;
      const statusMsg = document.getElementById('statusMessage');

      // Get name and vehicle — either from URL params or from the input fields
      const finalName = document.getElementById('customerNameInput').value.trim() || customerName || 'Customer';
      const finalVehicle = document.getElementById('vehicleInput').value.trim() || vehicleInfo || 'Vehicle';

      // Validation
      if (!finalName || finalName === 'Customer') {
        showStatus('Please enter your full name.', 'error');
        return;
      }

      if (!appointmentDate) {
        showStatus('Please select a date.', 'error');
        return;
      }

      if (!selectedTime) {
        showStatus('Please select a time.', 'error');
        return;
      }

      if (!customerPhone) {
        showStatus('Please enter your phone number.', 'error');
        return;
      }

      if (!customerEmail) {
        showStatus('Please enter your email.', 'error');
        return;
      }

      // Disable button and show loading
      const bookBtn = document.getElementById('bookBtn');
      const originalText = bookBtn.textContent;
      bookBtn.disabled = true;
      bookBtn.innerHTML = '<span class="spinner"></span> Booking...';

      try {
        // Create appointment in Firebase
        const appointmentTime = new Date(`${appointmentDate}T${selectedTime}:00`);

        const appointmentData = {
          recordId: recordId,
          customerName: finalName,
          vehicleInfo: finalVehicle,
          appointmentDate: appointmentDate,
          appointmentTime: appointmentTime,
          appointmentTimeString: selectedTime,
          customerPhone: customerPhone,
          customerEmail: customerEmail,
          status: 'booked',
          createdAt: serverTimestamp(),
          sourceType: 'verification'
        };

        // Add to Firebase
        const docRef = await addDoc(collection(db, 'evl_appointments'), appointmentData);

        console.log('[appointment-booking] Appointment created:', docRef.id);


          // ══════════════════════════════════════════════════════════
          // CALL AUTO-DEAL CREATION API
          // ══════════════════════════════════════════════════════════

          try {
            console.log('[appointment-booking] Calling auto-create-deal API...');

            const dealResponse = await fetch('/api/auto-create-deal', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                appointmentId: docRef.id,
                customerName: customerName,
                vehicleInfo: vehicleInfo,
                appointmentDate: appointmentDate,
                appointmentTimeString: selectedTime,
                customerPhone: customerPhone,
                customerEmail: customerEmail,
                recordId: recordId,
                sourceType: 'verification'
              })
            });

            const dealData = await dealResponse.json();

            if (dealResponse.ok) {
              console.log('[appointment-booking] Deal created successfully:', dealData.dealId);
            } else {
              console.warn('[appointment-booking] Deal creation warning:', dealData.error);
            }
          } catch (dealError) {
            console.error('[appointment-booking] Auto-deal API error:', dealError);
            // Don't fail the appointment if deal creation fails
          }

        // Show success
        showStatus('✅ Appointment booked! Check your email and SMS for confirmation.', 'success');

        // Redirect after 2 seconds
        setTimeout(() => {
            // Build confirmation page URL with all appointment data
            const confirmationUrl = new URL('/appointment-confirmation', window.location.origin);
            confirmationUrl.searchParams.append('appointmentId', docRef.id);
            confirmationUrl.searchParams.append('customerName', finalName);
            confirmationUrl.searchParams.append('vehicleInfo', finalVehicle);
            confirmationUrl.searchParams.append('appointmentDate', appointmentDate);
            confirmationUrl.searchParams.append('appointmentTime', selectedTime);
            confirmationUrl.searchParams.append('customerPhone', customerPhone);
            confirmationUrl.searchParams.append('customerEmail', customerEmail);
            window.location.href = confirmationUrl.toString();
        }, 2000);

      } catch (error) {
        console.error('[appointment-booking] Error:', error);
        showStatus('Could not book appointment. Please try again.', 'error');
        bookBtn.disabled = false;
        bookBtn.textContent = originalText;
      }
    });

    // ══════════════════════════════════════════════════════════
    // HELPER FUNCTION: SHOW STATUS MESSAGE
    // ══════════════════════════════════════════════════════════

    function showStatus(message, type) {
      const statusMsg = document.getElementById('statusMessage');
      statusMsg.textContent = message;
      statusMsg.className = `status-message ${type}`;
    }

  </script>
</body>
</html>
