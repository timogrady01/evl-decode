<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVL CRM Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f1419 0%, #1a2332 100%);
      color: #ffffff;
      overflow-x: hidden;
    }

    .header {
      background: #000000;
      padding: 20px;
      border-bottom: 1px solid #2a3f5f;
      text-align: center;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header h1 span {
      color: #4a9eff;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid #2a3f5f;
      overflow-x: auto;
      padding-bottom: 0;
    }

    .tab-btn {
      padding: 15px 20px;
      background: transparent;
      border: none;
      color: #a0b0c0;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab-btn:hover {
      color: #4a9eff;
    }

    .tab-btn.active {
      color: #4a9eff;
      border-bottom-color: #4a9eff;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .leads-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    .leads-table th {
      background: rgba(74, 158, 255, 0.15);
      border: 1px solid #4a9eff;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: #4a9eff;
      font-size: 12px;
      text-transform: uppercase;
    }

    .leads-table td {
      border: 1px solid #2a3f5f;
      padding: 12px;
      color: #a0b0c0;
      font-size: 13px;
    }

    .leads-table tr:hover {
      background: rgba(74, 158, 255, 0.05);
    }

    .deals-section {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .deal-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #2a3f5f;
      border-radius: 8px;
      padding: 20px;
    }

    .deal-card h3 {
      font-size: 14px;
      color: #4a9eff;
      margin-bottom: 15px;
      font-weight: 600;
    }

    .deal-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .deal-row .label {
      color: #a0b0c0;
    }

    .deal-row .value {
      font-weight: 600;
      color: #ffffff;
    }

    .checkin-container {
      max-width: 600px;
      margin: 0 auto;
    }

    .search-box {
      margin-bottom: 30px;
    }

    .search-box input {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid #2a3f5f;
      border-radius: 6px;
      color: #ffffff;
      font-size: 14px;
    }

    .search-box input::placeholder {
      color: #7a8aa0;
    }

    .search-results {
      display: grid;
      gap: 15px;
      margin-bottom: 20px;
    }

    .appointment-result {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #2a3f5f;
      border-radius: 6px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .appointment-result:hover {
      background: rgba(74, 158, 255, 0.1);
      border-color: #4a9eff;
    }

    .appointment-result.selected {
      background: rgba(74, 158, 255, 0.15);
      border-color: #4a9eff;
    }

    .appointment-detail {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .appointment-detail .label {
      color: #a0b0c0;
    }

    .appointment-detail .value {
      font-weight: 600;
      color: #ffffff;
    }

    .checkin-details {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #2a3f5f;
      border-radius: 8px;
      padding: 25px;
      margin-bottom: 20px;
      display: none;
    }

    .checkin-details.active {
      display: block;
    }

    .checkin-details h3 {
      font-size: 16px;
      color: #4a9eff;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 13px;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-row .label {
      color: #a0b0c0;
      font-weight: 500;
    }

    .detail-row .value {
      font-weight: 600;
      color: #ffffff;
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      padding: 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
    }

    .btn-checkin {
      background: #4caf50;
      color: #ffffff;
      grid-column: 1 / -1;
    }

    .btn-checkin:hover:not(:disabled) {
      background: #2e8b57;
      transform: translateY(-2px);
    }

    .btn-cancel {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      border: 1px solid #2a3f5f;
    }

    .btn-cancel:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.15);
      border-color: #4a9eff;
    }

    .btn:disabled {
      background: #4a5f7f;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .status-message {
      padding: 12px;
      border-radius: 6px;
      margin-top: 15px;
      font-size: 13px;
      text-align: center;
      display: none;
    }

    .status-message.success {
      background: rgba(76, 175, 80, 0.1);
      color: #4caf50;
      border: 1px solid rgba(76, 175, 80, 0.3);
      display: block;
    }

    .status-message.error {
      background: rgba(244, 67, 54, 0.1);
      color: #f44336;
      border: 1px solid rgba(244, 67, 54, 0.3);
      display: block;
    }

    .no-data {
      text-align: center;
      color: #a0b0c0;
      padding: 40px;
      font-size: 14px;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(74, 158, 255, 0.3);
      border-radius: 50%;
      border-top-color: #4a9eff;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      .container {
        margin: 20px auto;
        padding: 15px;
      }

      .button-group {
        grid-template-columns: 1fr;
      }

      .tabs {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>EXPRESS <span>VEHICLE</span> LOCATORS</h1>
  </div>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" data-tab="leads">📋 Leads</button>
      <button class="tab-btn" data-tab="deals">🤝 Deals</button>
      <button class="tab-btn" data-tab="appointments">📅 Appointments</button>
      <button class="tab-btn" data-tab="notes">📝 Notes</button>
      <button class="tab-btn" data-tab="checkin">✅ Check-In</button>
    </div>

    <div id="leads" class="tab-content active">
      <table class="leads-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Status</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="leadsTableBody"></tbody>
      </table>
      <div id="leadsEmpty" class="no-data">No leads found</div>
    </div>

    <div id="deals" class="tab-content">
      <div class="deals-section" id="dealsContainer"></div>
      <div id="dealsEmpty" class="no-data">No deals found</div>
    </div>

    <div id="appointments" class="tab-content">
      <table class="leads-table">
        <thead>
          <tr>
            <th>Customer</th>
            <th>Date</th>
            <th>Time</th>
            <th>Vehicle</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="appointmentsTableBody"></tbody>
      </table>
      <div id="appointmentsEmpty" class="no-data">No appointments found</div>
    </div>

    <div id="notes" class="tab-content">
      <table class="leads-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Related To</th>
            <th>Note</th>
          </tr>
        </thead>
        <tbody id="notesTableBody"></tbody>
      </table>
      <div id="notesEmpty" class="no-data">No notes found</div>
    </div>

    <div id="checkin" class="tab-content">
      <div class="checkin-container">
        <div class="search-box">
          <input type="text" id="checkinSearch" placeholder="Search by customer name or phone...">
        </div>

        <div class="search-results" id="searchResults"></div>

        <div class="checkin-details" id="checkinDetails">
          <h3>Customer Details</h3>
          <div class="detail-row">
            <span class="label">Name:</span>
            <span class="value" id="checkinName">—</span>
          </div>
          <div class="detail-row">
            <span class="label">Phone:</span>
            <span class="value" id="checkinPhone">—</span>
          </div>
          <div class="detail-row">
            <span class="label">Email:</span>
            <span class="value" id="checkinEmail">—</span>
          </div>
          <div class="detail-row">
            <span class="label">Vehicle:</span>
            <span class="value" id="checkinVehicle">—</span>
          </div>
          <div class="detail-row">
            <span class="label">Date:</span>
            <span class="value" id="checkinDate">—</span>
          </div>
          <div class="detail-row">
            <span class="label">Time:</span>
            <span class="value" id="checkinTime">—</span>
          </div>
          <div class="detail-row">
            <span class="label">Status:</span>
            <span class="value" id="checkinStatus">—</span>
          </div>

          <div class="button-group">
            <button class="btn btn-checkin" id="checkinBtn">✓ Customer Arrived</button>
            <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
          </div>

          <div class="status-message" id="checkinStatusMsg"></div>
        </div>

        <div id="checkinEmpty" class="no-data" style="padding: 60px 20px;">
          Search for a customer to begin check-in
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyDvV5u1dIvvPvKwLXQZ4MfH-F5bL_yL0hA",
      authDomain: "evl-acquisition-radar.firebaseapp.com",
      projectId: "evl-acquisition-radar",
      storageBucket: "evl-acquisition-radar.appspot.com",
      messagingSenderId: "637284038819",
      appId: "1:637284038819:web:f57c9d21efc62c6ac890e9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const tabName = e.target.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById(tabName).classList.add('active');
      });
    });

    const leadsQuery = query(collection(db, 'evl_leads'), orderBy('dateReceived', 'desc'));
    onSnapshot(leadsQuery, (snapshot) => {
      const tbody = document.getElementById('leadsTableBody');
      const empty = document.getElementById('leadsEmpty');
      tbody.innerHTML = '';
      if (snapshot.empty) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      snapshot.forEach(doc => {
        const data = doc.data();
        const row = document.createElement('tr');
        row.innerHTML = `<td>${data.customerName || '—'}</td><td>${data.customerPhone || '—'}</td><td>${data.customerEmail || '—'}</td><td>${data.status || 'new'}</td><td>${data.dateReceived ? new Date(data.dateReceived.toDate()).toLocaleDateString() : '—'}</td>`;
        tbody.appendChild(row);
      });
    });

    const dealsQuery = query(collection(db, 'evl_deals'), orderBy('dateCreated', 'desc'));
    onSnapshot(dealsQuery, (snapshot) => {
      const container = document.getElementById('dealsContainer');
      const empty = document.getElementById('dealsEmpty');
      container.innerHTML = '';
      if (snapshot.empty) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      snapshot.forEach(doc => {
        const data = doc.data();
        const card = document.createElement('div');
        card.className = 'deal-card';
        card.innerHTML = `<h3>${data.customerName || 'Unknown'}</h3><div class="deal-row"><span class="label">Vehicle:</span><span class="value">${data.vehicleInfo || '—'}</span></div><div class="deal-row"><span class="label">Stage:</span><span class="value">${data.dealStage || '—'}</span></div><div class="deal-row"><span class="label">Status:</span><span class="value">${data.status || '—'}</span></div><div class="deal-row"><span class="label">Trade Value:</span><span class="value">${data.tradeValue ? '$' + data.tradeValue : '—'}</span></div>`;
        container.appendChild(card);
      });
    });

    const appointmentsQuery = query(collection(db, 'evl_appointments'), orderBy('appointmentTime', 'asc'));
    onSnapshot(appointmentsQuery, (snapshot) => {
      const tbody = document.getElementById('appointmentsTableBody');
      const empty = document.getElementById('appointmentsEmpty');
      tbody.innerHTML = '';
      if (snapshot.empty) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      snapshot.forEach(doc => {
        const data = doc.data();
        const row = document.createElement('tr');
        row.innerHTML = `<td>${data.customerName || '—'}</td><td>${data.appointmentDate || '—'}</td><td>${data.appointmentTime || '—'}</td><td>${data.vehicleInfo || '—'}</td><td>${data.status || 'scheduled'}</td>`;
        tbody.appendChild(row);
      });
    });

    const notesQuery = query(collection(db, 'evl_notes'));
    onSnapshot(notesQuery, (snapshot) => {
      const tbody = document.getElementById('notesTableBody');
      const empty = document.getElementById('notesEmpty');
      tbody.innerHTML = '';
      if (snapshot.empty) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      snapshot.forEach(doc => {
        const data = doc.data();
        const row = document.createElement('tr');
        row.innerHTML = `<td>${data.createdAt ? new Date(data.createdAt.toDate()).toLocaleDateString() : '—'}</td><td>${data.relatedTo || '—'}</td><td>${data.noteText || '—'}</td>`;
        tbody.appendChild(row);
      });
    });

    let allAppointments = [];
    let selectedAppointmentId = null;
    let selectedAppointmentData = null;

    onSnapshot(appointmentsQuery, (snapshot) => {
      allAppointments = [];
      snapshot.forEach(doc => {
        allAppointments.push({ id: doc.id, ...doc.data() });
      });
    });

    document.getElementById('checkinSearch').addEventListener('input', (e) => {
      const searchTerm = e.target.value.toLowerCase().trim();
      const resultsDiv = document.getElementById('searchResults');
      const emptyDiv = document.getElementById('checkinEmpty');
      resultsDiv.innerHTML = '';
      if (!searchTerm) {
        emptyDiv.style.display = 'block';
        return;
      }
      const filtered = allAppointments.filter(apt => {
        const nameMatch = (apt.customerName || '').toLowerCase().includes(searchTerm);
        const phoneMatch = (apt.customerPhone || '').includes(searchTerm.replace(/\D/g, ''));
        return nameMatch || phoneMatch;
      });
      if (filtered.length === 0) {
        emptyDiv.style.display = 'block';
        return;
      }
      emptyDiv.style.display = 'none';
      filtered.forEach(apt => {
        const div = document.createElement('div');
        div.className = 'appointment-result';
        div.innerHTML = `<div class="appointment-detail"><span class="label">Name:</span><span class="value">${apt.customerName || '—'}</span></div><div class="appointment-detail"><span class="label">Vehicle:</span><span class="value">${apt.vehicleInfo || '—'}</span></div><div class="appointment-detail"><span class="label">Date & Time:</span><span class="value">${apt.appointmentDate} @ ${apt.appointmentTime}</span></div><div class="appointment-detail"><span class="label">Status:</span><span class="value">${apt.status || 'scheduled'}</span></div>`;
        div.addEventListener('click', () => {
          selectedAppointmentId = apt.id;
          selectedAppointmentData = apt;
          document.getElementById('checkinName').textContent = apt.customerName || '—';
          document.getElementById('checkinPhone').textContent = apt.customerPhone || '—';
          document.getElementById('checkinEmail').textContent = apt.customerEmail || '—';
          document.getElementById('checkinVehicle').textContent = apt.vehicleInfo || '—';
          document.getElementById('checkinDate').textContent = apt.appointmentDate || '—';
          document.getElementById('checkinTime').textContent = apt.appointmentTime || '—';
          document.getElementById('checkinStatus').textContent = apt.status || 'scheduled';
          document.getElementById('checkinDetails').classList.add('active');
          document.querySelectorAll('.appointment-result').forEach(el => {
            el.classList.remove('selected');
          });
          div.classList.add('selected');
        });
        resultsDiv.appendChild(div);
      });
    });

    document.getElementById('checkinBtn').addEventListener('click', async () => {
      if (!selectedAppointmentId) return;
      const btn = document.getElementById('checkinBtn');
      const statusMsg = document.getElementById('checkinStatusMsg');
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Checking in...';
      try {
        const appointmentRef = doc(db, 'evl_appointments', selectedAppointmentId);
        await updateDoc(appointmentRef, {
          status: 'checked-in',
          checkedInAt: new Date(),
          checkedInTime: new Date().toLocaleTimeString()
        });
        try {
          const smsResponse = await fetch('/api/pre-signing-nudge', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              appointmentId: selectedAppointmentId,
              customerName: selectedAppointmentData.customerName,
              customerPhone: selectedAppointmentData.customerPhone,
              dealerName: 'Dealership'
            })
          });
          const smsData = await smsResponse.json();
        } catch (smsError) {
          console.error('SMS error:', smsError);
        }
        statusMsg.className = 'status-message success';
        statusMsg.textContent = '✓ Customer checked in! SMS nudge sent.';
        btn.disabled = false;
        btn.textContent = originalText;
        setTimeout(() => {
          document.getElementById('checkinSearch').value = '';
          document.getElementById('searchResults').innerHTML = '';
          document.getElementById('checkinDetails').classList.remove('active');
          document.getElementById('checkinEmpty').style.display = 'block';
          statusMsg.className = 'status-message';
          selectedAppointmentId = null;
          selectedAppointmentData = null;
        }, 2000);
      } catch (error) {
        console.error('Error:', error);
        statusMsg.className = 'status-message error';
        statusMsg.textContent = 'Error checking in. Please try again.';
        btn.disabled = false;
        btn.textContent = originalText;
      }
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      document.getElementById('checkinSearch').value = '';
      document.getElementById('searchResults').innerHTML = '';
      document.getElementById('checkinDetails').classList.remove('active');
      document.getElementById('checkinEmpty').style.display = 'block';
      document.getElementById('checkinStatusMsg').className = 'status-message';
      selectedAppointmentId = null;
      selectedAppointmentData = null;
    });
  </script>
</body>
</html>
