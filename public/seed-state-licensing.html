<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>One-Time Seed — State Licensing Table</title>
<style>
  body { background:#020203; color:#fff; font-family:-apple-system,sans-serif; padding:40px; max-width:700px; margin:0 auto; }
  h1 { font-size:20px; margin-bottom:20px; }
  button { background:#2B84FE; color:#fff; border:none; padding:16px 28px; border-radius:8px; font-size:15px; font-weight:800; cursor:pointer; min-height:48px; }
  button:disabled { opacity:0.5; }
  #log { margin-top:24px; background:#090E17; border-radius:8px; padding:16px; font-family:monospace; font-size:13px; white-space:pre-wrap; min-height:100px; }
</style>
</head>
<body>
  <h1>One-Time Seed: evl_state_licensing</h1>
  <p style="color:#C8D0DC;font-size:14px;margin-bottom:20px;">Click the button once to populate the state licensing table. Safe to run more than once — it just overwrites each state's record with the same data.</p>
  <button id="seedBtn" onclick="runSeed()">Run Seed</button>
  <div id="log">Ready.</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCvvH8bYkoHM933iwODK4AlT2T4HVAJzho",
      authDomain: "evl-acquisition-radar.firebaseapp.com",
      projectId: "evl-acquisition-radar",
      storageBucket: "evl-acquisition-radar.firebasestorage.app",
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const STATES = [
      { state:'TX', hub:'plano', tier:'green', live:true, confidence:'confirmed',
        note:'Home state / HQ. Launch market.', statute:null, costEstimate:null },
      { state:'TX', hub:'houston', tier:'green', live:true, confidence:'confirmed',
        note:'Second TX hub, same state rules as Plano/DFW.', statute:null, costEstimate:null },
      { state:'GA', hub:'atlanta', tier:'pending_review', live:false, confidence:'unconfirmed',
        note:'PUT ON HOLD July 22, 2026 pending attorney consultation. Statute defines "motor vehicle broker" narrowly (negotiates on behalf of another), which may not capture EVL\'s neutral-platform model — but a SEPARATE auction-company provision in the same statute may apply directly to WS Exchange\'s phase-based bidding mechanics regardless of the broker question. Genuine legal gray area, not yet resolved. Do not treat as cleared.',
        statute:'O.C.G.A. § 43-47-2', costEstimate:'~$500/yr broker license IF required' },
      { state:'IL', hub:'chicago', tier:'yellow', live:false, confidence:'unconfirmed',
        note:'From June 23, 2026 research pass, not independently re-verified this session.',
        statute:null, costEstimate:'~$1,000/yr (Auto Auction Operator or Broker designation)' },
      { state:'CO', hub:'denver', tier:'pending_review', live:false, confidence:'unconfirmed',
        note:'Listed green in one research pass, not confirmed in the more detailed statute-cited pass. Needs re-verification.',
        statute:null, costEstimate:null },
      { state:'AZ', hub:'phoenix', tier:'pending_review', live:false, confidence:'unconfirmed',
        note:'Listed green in one research pass, not confirmed in the more detailed statute-cited pass. Needs re-verification.',
        statute:null, costEstimate:null },
      { state:'CA', hub:'la', tier:'red', live:false, confidence:'confirmed',
        note:'Broadest dealer definition in the country. Full dealer license required, significant cost.',
        statute:'Cal. B&P Code § 11700', costEstimate:'Full dealer license — significant cost' },
      { state:'NJ', hub:'nyc', tier:'red', live:false, confidence:'unconfirmed',
        note:'From June 23, 2026 research pass, not independently re-verified this session.',
        statute:'N.J.S.A. 39:10-19', costEstimate:'Dealer license required' },
      { state:'FL', hub:'miami', tier:'yellow', live:false, confidence:'unconfirmed',
        note:'From June 23, 2026 research pass, not independently re-verified this session.',
        statute:null, costEstimate:'~$300/yr (MV Broker license)' },
      { state:'TN', hub:'nashville', tier:'pending_review', live:false, confidence:'unconfirmed',
        note:'Listed green in one research pass, not confirmed in the more detailed statute-cited pass. Needs re-verification.',
        statute:null, costEstimate:null },
      { state:'WA', hub:'seattle', tier:'pending_review', live:false, confidence:'unconfirmed',
        note:'Listed green in one research pass, not confirmed in the more detailed statute-cited pass. Needs re-verification.',
        statute:null, costEstimate:null },
      { state:'MN', hub:'minneapolis', tier:'green', live:false, confidence:'confirmed',
        note:'No facilitation statute. Platform fee treated as software revenue.',
        statute:null, costEstimate:null },
      { state:'NC', hub:'charlotte', tier:'green', live:false, confidence:'confirmed',
        note:'No broker statute capturing D2D tech platforms.',
        statute:null, costEstimate:null },
      { state:'OH', hub:'columbus', tier:'green', live:false, confidence:'confirmed',
        note:'D2D wholesale exempt from broker licensing requirements.',
        statute:null, costEstimate:null },
      { state:'PA', hub:'philly', tier:'yellow', live:false, confidence:'unconfirmed',
        note:'From June 23, 2026 research pass, not independently re-verified this session.',
        statute:null, costEstimate:'~$800/yr (MV Dealer license, wholesale)' },
      { state:'MI', hub:'detroit', tier:'green', live:false, confidence:'confirmed',
        note:'D2D wholesale transactions between licensed dealers not regulated as brokerage.',
        statute:null, costEstimate:null },
      { state:'VA', hub:'richmond', tier:'yellow', live:false, confidence:'unconfirmed',
        note:'From June 23, 2026 research pass, not independently re-verified this session.',
        statute:null, costEstimate:'~$400/yr (Dealer/Broker license)' },
      { state:'IN', hub:'indy', tier:'yellow', live:false, confidence:'unconfirmed',
        note:'From June 23, 2026 research pass, not independently re-verified this session.',
        statute:null, costEstimate:'~$250/yr (MV Dealer license, wholesale)' },
      { state:'MO', hub:'stlouis', tier:'yellow', live:false, confidence:'unconfirmed',
        note:'From June 23, 2026 research pass, not independently re-verified this session.',
        statute:null, costEstimate:'~$300/yr (MV Dealer license, wholesale)' },
      { state:'WI', hub:'milwaukee', tier:'yellow', live:false, confidence:'unconfirmed',
        note:'From June 23, 2026 research pass, not independently re-verified this session. Note: an earlier, less-detailed research pass listed SC instead of WI in the yellow tier — WI used here since it matches an actual hub market and the more detailed source.',
        statute:null, costEstimate:'~$350/yr (MV Dealer license, wholesale)' },
      { state:'MD', hub:'baltimore', tier:'yellow', live:false, confidence:'unconfirmed',
        note:'From June 23, 2026 research pass, not independently re-verified this session.',
        statute:null, costEstimate:'~$500/yr (MV Dealer license, wholesale)' },
      { state:'NV', hub:'lasvegas', tier:'green', live:false, confidence:'confirmed',
        note:'No facilitation statute applicable to D2D SaaS platforms.',
        statute:null, costEstimate:null },
    ];

    window.runSeed = async function() {
      const btn = document.getElementById('seedBtn');
      const log = document.getElementById('log');
      btn.disabled = true;
      log.textContent = 'Seeding...\n';

      try {
        for (const s of STATES) {
          await setDoc(doc(db, 'evl_state_licensing', s.state), {
            ...s,
            lastUpdated: new Date().toISOString()
          });
          log.textContent += `✅ ${s.state} (${s.hub}) — tier: ${s.tier}, confidence: ${s.confidence}\n`;
        }
        log.textContent += `\nDone. ${STATES.length} states seeded successfully.`;
      } catch (err) {
        log.textContent += `\n❌ ERROR: ${err.message}\n\nMake sure the Firestore rule for evl_state_licensing has been published first.`;
        console.error(err);
      } finally {
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
